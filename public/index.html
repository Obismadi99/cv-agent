<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Agent</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f5;
    --surface: #ffffff;
    --surface2: #f2f1ef;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #999;
    --accent: #1a1a1a;
    --accent-bg: #f0f0f0;
    --info: #1a6fdb;
    --info-bg: #eef4fd;
    --success: #187a4a;
    --success-bg: #edf7f2;
    --warn: #a35c00;
    --warn-bg: #fdf4e7;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* ── HEADER ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 52px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 600; }
  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tab { padding: 6px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; color: var(--text2); border: none; background: transparent; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active { background: var(--surface2); color: var(--text); font-weight: 500; }

  /* ── LAYOUT ── */
  .app-body { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 52px); }

  /* ── DOCS TAB ── */
  #view-docs { display: flex; flex: 1; overflow: hidden; }
  #view-docs.hidden, #view-agent.hidden { display: none; }

  .doc-sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 12px 12px 8px; border-bottom: 1px solid var(--border); }
  .sidebar-header span { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .doc-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
  .doc-list-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.1s; border: 1px solid transparent; }
  .doc-list-item:hover { background: var(--surface2); }
  .doc-list-item.active { background: var(--info-bg); border-color: rgba(26,111,219,0.2); color: var(--info); }
  .doc-list-item .doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .doc-list-item .doc-chars { font-size: 11px; color: var(--text3); }
  .doc-delete-btn { opacity: 0; font-size: 15px; color: var(--text3); cursor: pointer; padding: 2px; border: none; background: none; border-radius: 4px; }
  .doc-list-item:hover .doc-delete-btn { opacity: 1; }
  .doc-delete-btn:hover { color: #c0392b; background: #fde8e8; }

  .sidebar-footer { padding: 8px; border-top: 1px solid var(--border); }
  .new-doc-row { display: flex; gap: 6px; }
  .new-doc-input { flex: 1; padding: 7px 10px; font-size: 13px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); color: var(--text); }
  .new-doc-input:focus { outline: none; border-color: var(--info); }
  .icon-btn { padding: 7px 10px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); cursor: pointer; font-size: 15px; color: var(--text2); transition: all 0.1s; }
  .icon-btn:hover { background: var(--surface); color: var(--text); }

  .doc-editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .editor-header { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 10px; }
  .editor-title-input { flex: 1; border: none; background: transparent; font-size: 15px; font-weight: 600; color: var(--text); outline: none; }
  .saved-badge { font-size: 12px; color: var(--success); background: var(--success-bg); padding: 3px 10px; border-radius: 99px; opacity: 0; transition: opacity 0.3s; }
  .saved-badge.show { opacity: 1; }
  .editor-body { flex: 1; overflow: hidden; }
  .doc-textarea { width: 100%; height: 100%; border: none; background: var(--surface); padding: 1.5rem; font-size: 13.5px; line-height: 1.75; color: var(--text); resize: none; outline: none; font-family: 'Menlo', 'Consolas', monospace; }
  .doc-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text2); }
  .doc-empty i { font-size: 36px; opacity: 0.3; }
  .doc-empty p { font-size: 14px; }

  /* ── AGENT TAB ── */
  #view-agent { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .agent-input-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; flex-shrink: 0; }
  .agent-input-bar label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 8px; }
  .job-textarea { width: 100%; height: 110px; border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 12px 14px; font-size: 13.5px; line-height: 1.65; resize: none; background: var(--surface2); color: var(--text); font-family: inherit; }
  .job-textarea:focus { outline: none; border-color: var(--info); }
  .run-btn { margin-top: 10px; padding: 9px 20px; background: var(--text); color: var(--surface); border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: opacity 0.15s; }
  .run-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .run-btn:not(:disabled):hover { opacity: 0.85; }

  .agent-body { flex: 1; display: flex; overflow: hidden; }
  .agent-log-panel { width: 360px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; background: var(--bg); }
  .log-step { display: flex; gap: 10px; }
  .log-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; margin-top: 2px; }
  .log-icon.tool { background: var(--warn-bg); color: var(--warn); }
  .log-icon.agent { background: var(--info-bg); color: var(--info); }
  .log-icon.result { background: var(--success-bg); color: var(--success); }
  .log-icon.error { background: #fde8e8; color: #c0392b; }
  .log-body { flex: 1; min-width: 0; }
  .log-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .log-text { font-size: 12.5px; line-height: 1.55; color: var(--text); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; word-break: break-word; white-space: pre-wrap; }

  .cv-output-panel { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .cv-output-header { padding: 12px 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .cv-output-header span { font-size: 13px; font-weight: 600; color: var(--text2); }
  .copy-btn { margin-left: auto; padding: 5px 12px; font-size: 12px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .copy-btn:hover { background: var(--surface); color: var(--text); }
  .cv-output-body { flex: 1; padding: 1.5rem 2rem; }
  .cv-text { font-size: 13.5px; line-height: 1.8; color: var(--text); white-space: pre-wrap; font-family: 'Georgia', serif; }
  .cv-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 100%; color: var(--text2); }
  .cv-placeholder i { font-size: 40px; opacity: 0.25; }
  .cv-placeholder p { font-size: 14px; }

  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .log-empty { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 2rem 1rem; color: var(--text3); text-align: center; }
  .log-empty i { font-size: 28px; opacity: 0.3; }
  .log-empty p { font-size: 13px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <i class="ti ti-file-cv" style="font-size:20px; color:#888;"></i>
  <h1>CV Agent</h1>
  <div class="tabs">
    <button class="tab active" id="tab-docs" onclick="switchTab('docs')">
      <i class="ti ti-files"></i> My Docs
    </button>
    <button class="tab" id="tab-agent" onclick="switchTab('agent')">
      <i class="ti ti-robot"></i> Generate CV
    </button>
  </div>
</header>

<div class="app-body">

  <!-- ── DOCS VIEW ── -->
  <div id="view-docs">
    <div class="doc-sidebar">
      <div class="sidebar-header"><span>Documents</span></div>
      <div class="doc-list" id="doc-list"></div>
      <div class="sidebar-footer">
        <div class="new-doc-row">
          <input class="new-doc-input" id="new-doc-name" placeholder="New doc name…" onkeydown="if(event.key==='Enter')addDoc()" />
          <button class="icon-btn" onclick="addDoc()" title="Add document"><i class="ti ti-plus"></i></button>
        </div>
      </div>
    </div>
    <div class="doc-editor" id="doc-editor">
      <div class="doc-empty" id="doc-empty">
        <i class="ti ti-file-text"></i>
        <p>Select a document to edit</p>
      </div>
      <div id="editor-panel" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div class="editor-header">
          <i class="ti ti-file-text" style="font-size:16px; color:#888;"></i>
          <input class="editor-title-input" id="editor-title" placeholder="Document name" oninput="renameDoc(this.value)" />
          <span class="saved-badge" id="saved-badge">Saved</span>
        </div>
        <div class="editor-body">
          <textarea class="doc-textarea" id="doc-textarea" oninput="saveDoc(this.value)"
            placeholder="Paste your CV, skills, projects, or any relevant info here…"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- ── AGENT VIEW ── -->
  <div id="view-agent" class="hidden">
    <div class="agent-input-bar">
      <label>Job description</label>
      <textarea class="job-textarea" id="job-desc"
        placeholder="Paste the job description here. The agent will read your documents and write a tailored CV…"></textarea>
      <button class="run-btn" id="run-btn" onclick="runAgent()">
        <i class="ti ti-sparkles"></i> Generate tailored CV
      </button>
    </div>
    <div class="agent-body">
      <div class="agent-log-panel" id="agent-log">
        <div class="log-empty" id="log-empty">
          <i class="ti ti-activity"></i>
          <p>Agent steps will appear here as it reads your documents</p>
        </div>
      </div>
      <div class="cv-output-panel">
        <div class="cv-output-header">
          <i class="ti ti-file-check" style="font-size:16px; color:#888;"></i>
          <span>Generated CV</span>
          <button class="copy-btn" id="copy-btn" onclick="copyCV()" style="display:none;">
            <i class="ti ti-copy"></i> Copy
          </button>
        </div>
        <div class="cv-output-body">
          <div class="cv-placeholder" id="cv-placeholder">
            <i class="ti ti-file-description"></i>
            <p>Your tailored CV will appear here</p>
          </div>
          <div class="cv-text" id="cv-text" style="display:none;"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let currentDoc = null;
let saveTimer = null;
let originalName = null;

// ── TAB SWITCHING ──
function switchTab(tab) {
  ['docs','agent'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('view-'+t).classList.toggle('hidden', t!==tab);
  });
}

// ── DOCS ──
async function loadDocs() {
  const res = await fetch('/api/docs');
  const docs = await res.json();
  renderDocList(docs);
}

function renderDocList(docs) {
  const el = document.getElementById('doc-list');
  el.innerHTML = '';
  docs.forEach(doc => {
    const item = document.createElement('div');
    item.className = 'doc-list-item' + (currentDoc === doc.name ? ' active' : '');
    item.dataset.name = doc.name;
    item.innerHTML = `
      <i class="ti ti-file-text" style="font-size:15px; flex-shrink:0;"></i>
      <span class="doc-name">${esc(doc.name)}</span>
      <span class="doc-chars">${doc.chars}c</span>
      <button class="doc-delete-btn" onclick="deleteDoc(event,'${esc(doc.name)}')" title="Delete"><i class="ti ti-trash"></i></button>
    `;
    item.onclick = (e) => { if (!e.target.closest('.doc-delete-btn')) selectDoc(doc.name); };
    el.appendChild(item);
  });
}

async function selectDoc(name) {
  currentDoc = name;
  originalName = name;
  const res = await fetch('/api/docs/' + encodeURIComponent(name));
  const doc = await res.json();
  document.getElementById('doc-empty').style.display = 'none';
  const panel = document.getElementById('editor-panel');
  panel.style.display = 'flex';
  document.getElementById('editor-title').value = doc.name;
  document.getElementById('doc-textarea').value = doc.content;
  loadDocs();
}

function saveDoc(content) {
  if (!currentDoc) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await fetch('/api/docs/' + encodeURIComponent(currentDoc), {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ content })
    });
    showSaved();
    loadDocs();
  }, 500);
}

async function renameDoc(newName) {
  if (!currentDoc || !newName.trim()) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await fetch('/api/docs/' + encodeURIComponent(currentDoc) + '/rename', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ newName: newName.trim() })
    });
    currentDoc = newName.trim();
    showSaved();
    loadDocs();
  }, 700);
}

async function addDoc() {
  const input = document.getElementById('new-doc-name');
  const name = input.value.trim() || 'Untitled';
  await fetch('/api/docs/' + encodeURIComponent(name), {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ content: '' })
  });
  input.value = '';
  await loadDocs();
  selectDoc(name);
}

async function deleteDoc(e, name) {
  e.stopPropagation();
  if (!confirm(`Delete "${name}"?`)) return;
  await fetch('/api/docs/' + encodeURIComponent(name), { method: 'DELETE' });
  if (currentDoc === name) {
    currentDoc = null;
    document.getElementById('editor-panel').style.display = 'none';
    document.getElementById('doc-empty').style.display = 'flex';
  }
  loadDocs();
}

function showSaved() {
  const b = document.getElementById('saved-badge');
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 1500);
}

// ── AGENT ──
const SYSTEM_PROMPT = `You are a professional CV writer and career coach. Your job is to create highly tailored CVs.

Process:
1. Call list_documents to see what's available
2. Call read_document for EACH document to gather the user's full information
3. Analyse the job description — key skills, keywords, tone, seniority level
4. Write a polished, professional CV that highlights the most relevant experience
5. Mirror language and keywords from the job description where truthful
6. Use clear sections: Summary, Experience, Skills, Education, Projects (as appropriate)
7. Quantify achievements where possible

Read ALL documents before writing. Be thorough and specific.`;

const TOOLS = [
  {
    name: "list_documents",
    description: "Returns the names of all documents in the user's knowledge base. Call this first.",
    input_schema: { type: "object", properties: {}, required: [] }
  },
  {
    name: "read_document",
    description: "Reads the full content of a document by its exact name.",
    input_schema: {
      type: "object",
      properties: {
        document_name: { type: "string", description: "Exact document name as returned by list_documents" }
      },
      required: ["document_name"]
    }
  }
];

async function runAgent() {
  const jobDesc = document.getElementById('job-desc').value.trim();
  if (!jobDesc) { alert('Please paste a job description first.'); return; }

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Agent working…';

  // Reset UI
  const logEl = document.getElementById('agent-log');
  logEl.innerHTML = '';
  document.getElementById('cv-placeholder').style.display = 'flex';
  document.getElementById('cv-text').style.display = 'none';
  document.getElementById('copy-btn').style.display = 'none';

  const messages = [{
    role: 'user',
    content: `Please create a tailored CV for this job description:\n\n${jobDesc}\n\nFirst check my documents, read them all, then write the CV.`
  }];

  try {
    let iterations = 0;
    while (iterations++ < 12) {
      const res = await fetch('/api/agent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          system: SYSTEM_PROMPT,
          tools: TOOLS,
          messages
        })
      });

      const data = await res.json();
      if (data.error) { addLog('error', 'Error', data.error.message || JSON.stringify(data.error)); break; }

      messages.push({ role: 'assistant', content: data.content });

      const toolResults = [];
      let hasTools = false;

      for (const block of data.content) {
        if (block.type === 'text' && block.text.trim()) {
          if (data.stop_reason === 'end_turn' && !data.content.some(b => b.type === 'tool_use')) {
            showCV(block.text);
          } else {
            addLog('agent', 'Thinking', block.text);
          }
        }
        if (block.type === 'tool_use') {
          hasTools = true;
          let result = '';
          if (block.name === 'list_documents') {
            addLog('tool', 'Tool → list_documents', 'Fetching document list…');
            const r = await fetch('/api/docs');
            const docs = await r.json();
            result = docs.length
              ? `Available documents (${docs.length}):\n${docs.map(d => `- ${d.name}`).join('\n')}`
              : 'No documents found.';
            addLog('result', 'Documents found', result);
          } else if (block.name === 'read_document') {
            const name = block.input.document_name;
            addLog('tool', `Tool → read_document`, `Reading: "${name}"`);
            const r = await fetch('/api/docs/' + encodeURIComponent(name));
            if (r.ok) {
              const doc = await r.json();
              result = doc.content;
              addLog('result', `"${name}" loaded`, doc.content.slice(0, 220) + (doc.content.length > 220 ? '…' : ''));
            } else {
              result = `Document "${name}" not found.`;
              addLog('error', 'Not found', result);
            }
          }
          toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: result });
        }
      }

      if (hasTools) {
        messages.push({ role: 'user', content: toolResults });
      } else {
        const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
        if (text) showCV(text);
        break;
      }
    }
  } catch(e) {
    addLog('error', 'Error', String(e));
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-sparkles"></i> Generate tailored CV';
}

function addLog(type, label, text) {
  document.getElementById('log-empty')?.remove();
  const icons = { tool: 'ti-tool', agent: 'ti-robot', result: 'ti-check', error: 'ti-alert-circle' };
  const div = document.createElement('div');
  div.className = 'log-step';
  div.innerHTML = `
    <div class="log-icon ${type}"><i class="ti ${icons[type]||'ti-circle'}"></i></div>
    <div class="log-body">
      <div class="log-label">${esc(label)}</div>
      <div class="log-text">${esc(text)}</div>
    </div>`;
  document.getElementById('agent-log').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showCV(text) {
  document.getElementById('cv-placeholder').style.display = 'none';
  const el = document.getElementById('cv-text');
  el.textContent = text;
  el.style.display = 'block';
  document.getElementById('copy-btn').style.display = 'flex';
  addLog('result', 'Done', 'CV generated successfully.');
}

function copyCV() {
  navigator.clipboard.writeText(document.getElementById('cv-text').textContent);
  const btn = document.getElementById('copy-btn');
  btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
  setTimeout(() => btn.innerHTML = '<i class="ti ti-copy"></i> Copy', 2000);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadDocs();
</script>
</body>
</html>
